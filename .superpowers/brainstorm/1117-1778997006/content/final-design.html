<h2>最终界面设计</h2>
<p class="subtitle">淡黄色主题 · 标题栏日期查询入口 · 划掉保留 · 支持删除</p>

<div class="split">
  <div class="mockup">
    <div class="mockup-header">主界面 — 今日待办</div>
    <div class="mockup-body">
      <div style="background:#FFF9E6;padding:20px;font-family:'Microsoft YaHei',sans-serif;border-radius:8px;min-height:360px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
          <span style="font-weight:bold;font-size:18px;color:#5D4E37;">📋 我的待办</span>
          <a style="color:#B8860B;font-size:13px;cursor:pointer;text-decoration:underline;">📅 查询历史</a>
        </div>
        <div style="display:flex;gap:8px;margin-bottom:16px;">
          <input style="flex:1;padding:8px 12px;border:1px solid #E0C97F;border-radius:6px;background:#FFFDE7;font-size:14px;color:#5D4E37;" placeholder="添加今天的待办..." disabled>
          <button style="background:#FFD54F;border:none;padding:8px 18px;border-radius:6px;font-size:14px;cursor:pointer;color:#5D4E37;font-weight:500;">添加</button>
        </div>
        <div style="background:#FFFDE7;border:1px solid #E0C97F;border-radius:8px;overflow:hidden;">
          <div style="padding:10px 12px;border-bottom:1px solid #F0E6C0;display:flex;justify-content:space-between;align-items:center;">
            <span style="font-size:14px;color:#5D4E37;cursor:pointer;">☐ 买菜</span>
            <span style="color:#ccc;font-size:12px;cursor:pointer;" title="删除">✕</span>
          </div>
          <div style="padding:10px 12px;border-bottom:1px solid #F0E6C0;display:flex;justify-content:space-between;align-items:center;background:#F8F2DC;">
            <span style="font-size:14px;text-decoration:line-through;color:#aaa;cursor:pointer;">✓ 完成报告</span>
            <span style="color:#ccc;font-size:12px;cursor:pointer;" title="删除">✕</span>
          </div>
          <div style="padding:10px 12px;display:flex;justify-content:space-between;align-items:center;">
            <span style="font-size:14px;color:#5D4E37;cursor:pointer;">☐ 健身30分钟</span>
            <span style="color:#ccc;font-size:12px;cursor:pointer;" title="删除">✕</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="mockup">
    <div class="mockup-header">日期查询弹窗</div>
    <div class="mockup-body">
      <div style="background:#FFF9E6;padding:20px;font-family:'Microsoft YaHei',sans-serif;border-radius:8px;min-height:360px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
          <span style="font-weight:bold;font-size:18px;color:#5D4E37;">📅 查询历史待办</span>
          <a style="color:#B8860B;font-size:13px;cursor:pointer;text-decoration:underline;">← 返回今天</a>
        </div>
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:16px;">
          <label style="font-size:14px;color:#5D4E37;">选择日期：</label>
          <input type="date" style="padding:8px 12px;border:1px solid #E0C97F;border-radius:6px;background:#FFFDE7;font-size:14px;color:#5D4E37;" disabled>
          <button style="background:#FFD54F;border:none;padding:8px 16px;border-radius:6px;font-size:14px;cursor:pointer;color:#5D4E37;">查询</button>
        </div>
        <div style="background:#FFFDE7;border:1px solid #E0C97F;border-radius:8px;overflow:hidden;">
          <div style="padding:10px 12px;border-bottom:1px solid #F0E6C0;display:flex;justify-content:space-between;align-items:center;background:#F8F2DC;">
            <span style="font-size:14px;text-decoration:line-through;color:#aaa;">✓ 完成报告</span>
            <span style="color:#ccc;font-size:12px;">✕</span>
          </div>
          <div style="padding:10px 12px;display:flex;justify-content:space-between;align-items:center;">
            <span style="font-size:14px;color:#5D4E37;">☐ 团队会议</span>
            <span style="color:#ccc;font-size:12px;">✕</span>
          </div>
        </div>
        <div style="margin-top:12px;text-align:center;font-size:12px;color:#B8860B;">共 2 项，已完成 1 项</div>
      </div>
    </div>
  </div>
</div>

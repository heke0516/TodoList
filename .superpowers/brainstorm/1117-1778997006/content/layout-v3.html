<h2>精简布局 — 日期查询作为轻量入口</h2>
<p class="subtitle">主界面只显示今天的待办，日期查询通过一个按钮/链接触发</p>

<div class="cards">
  <div class="card" data-choice="header-link" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="background:#FFF9E6;padding:16px;font-family:sans-serif;border-radius:8px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
          <span style="font-weight:bold;font-size:16px;">📋 我的待办</span>
          <a style="color:#B8860B;font-size:12px;cursor:pointer;text-decoration:underline;">📅 查询历史</a>
        </div>
        <div style="display:flex;gap:8px;margin-bottom:14px;">
          <input style="flex:1;padding:7px 10px;border:1px solid #E0C97F;border-radius:4px;background:#FFFDE7;font-size:13px;" placeholder="添加今天的待办..." disabled>
          <button style="background:#FFD54F;border:none;padding:7px 14px;border-radius:4px;font-size:13px;cursor:pointer;">添加</button>
        </div>
        <div style="background:#FFFDE7;border:1px solid #E0C97F;border-radius:6px;padding:8px;">
          <div style="padding:7px 6px;border-bottom:1px solid #F0E6C0;font-size:13px;cursor:pointer;">☐ 买菜</div>
          <div style="padding:7px 6px;border-bottom:1px solid #F0E6C0;font-size:13px;text-decoration:line-through;color:#999;cursor:pointer;">✓ 完成报告</div>
          <div style="padding:7px 6px;font-size:13px;cursor:pointer;">☐ 健身30分钟</div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>A. 标题栏链接</h3>
      <p>右上角"查询历史"文字链接，点击弹出日期选择器。主界面极简，无任何日期元素。</p>
    </div>
  </div>

  <div class="card" data-choice="bottom-btn" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="background:#FFF9E6;padding:16px;font-family:sans-serif;border-radius:8px;">
        <div style="font-weight:bold;font-size:16px;margin-bottom:14px;">📋 我的待办</div>
        <div style="display:flex;gap:8px;margin-bottom:14px;">
          <input style="flex:1;padding:7px 10px;border:1px solid #E0C97F;border-radius:4px;background:#FFFDE7;font-size:13px;" placeholder="添加今天的待办..." disabled>
          <button style="background:#FFD54F;border:none;padding:7px 14px;border-radius:4px;font-size:13px;cursor:pointer;">添加</button>
        </div>
        <div style="background:#FFFDE7;border:1px solid #E0C97F;border-radius:6px;padding:8px;margin-bottom:14px;">
          <div style="padding:7px 6px;border-bottom:1px solid #F0E6C0;font-size:13px;cursor:pointer;">☐ 买菜</div>
          <div style="padding:7px 6px;border-bottom:1px solid #F0E6C0;font-size:13px;text-decoration:line-through;color:#999;cursor:pointer;">✓ 完成报告</div>
          <div style="padding:7px 6px;font-size:13px;cursor:pointer;">☐ 健身30分钟</div>
        </div>
        <div style="text-align:center;">
          <button style="background:transparent;border:1px solid #E0C97F;padding:6px 16px;border-radius:4px;font-size:12px;color:#B8860B;cursor:pointer;">📅 查看其他日期</button>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>B. 底部按钮</h3>
      <p>列表下方放一个低调的"查看其他日期"按钮。不干扰主流程，需要时自然向下看。</p>
    </div>
  </div>

  <div class="card" data-choice="toolbar-btn" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="background:#FFF9E6;padding:16px;font-family:sans-serif;border-radius:8px;">
        <div style="display:flex;gap:8px;margin-bottom:14px;">
          <input style="flex:1;padding:7px 10px;border:1px solid #E0C97F;border-radius:4px;background:#FFFDE7;font-size:13px;" placeholder="添加今天的待办..." disabled>
          <button style="background:#FFD54F;border:none;padding:7px 14px;border-radius:4px;font-size:13px;cursor:pointer;">添加</button>
          <button style="background:#FFF3C4;border:1px solid #E0C97F;padding:7px 10px;border-radius:4px;font-size:13px;cursor:pointer;" title="查询历史">📅</button>
        </div>
        <div style="background:#FFFDE7;border:1px solid #E0C97F;border-radius:6px;padding:8px;">
          <div style="padding:7px 6px;border-bottom:1px solid #F0E6C0;font-size:13px;cursor:pointer;">☐ 买菜</div>
          <div style="padding:7px 6px;border-bottom:1px solid #F0E6C0;font-size:13px;text-decoration:line-through;color:#999;cursor:pointer;">✓ 完成报告</div>
          <div style="padding:7px 6px;font-size:13px;cursor:pointer;">☐ 健身30分钟</div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>C. 输入栏旁图标按钮</h3>
      <p>在输入框右侧放一个📅图标按钮，与"添加"按钮并排。最紧凑，操作路径最短。</p>
    </div>
  </div>
</div>

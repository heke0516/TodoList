appId: com.todolist.app
productName: ToDoList
directories:
  output: release
files:
  - dist/**/*
  - electron/**/*
  - node_modules/**/*
win:
  target:
    - nsis
  icon: electron/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: electron/icon.png
  uninstallerIcon: electron/icon.png
